name: Publish Python Package to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Format check with ruff
        uses: astral-sh/ruff-action@v4.0.0
        with:
          args: format --check --diff
          src: >-
            dnnlpy/src
            dnnlpy/tests
      
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            dnnlpy/pyproject.toml

      - name: Install dependencies
        run: |
          uv python install 3.14
          uv sync --python 3.14 --package dnnlpy --extra test

      - name: Test dnnlpy package
        run: uv run --package dnnlpy -m pytest dnnlpy/tests

      - name: Build dnnlpy package
        run: uv build --package dnnlpy --out-dir dist

      - name: Publish to PyPI
        run: uv publish

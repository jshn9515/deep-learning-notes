name: Check Quarto Website Rendering

on:
  pull_request:
    branches: [main]
    paths:
      - "zh/**"
      - "en/**"
      - "ref-*.bib"
      - "_freeze/**"
      - "index.qmd"
      - "_quarto.yml"
      - "styles.css"
      - "pyproject.toml"
      - ".github/workflows/render-check.yml"

permissions:
  contents: read

concurrency:
  group: render-website-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render-check:
    name: Check Quarto Website Rendering
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            dnnl/pyproject.toml

      - name: Install dependencies
        run: |
          uv python install 3.14
          uv sync --python 3.14 --all-packages

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        env:
          QUARTO_PYTHON: ${{ github.workspace }}/.venv/bin/python
        run: quarto render

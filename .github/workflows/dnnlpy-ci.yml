name: Test and Build dnnlpy package

on:
  push:
    branches: [main]
    paths:
      - "dnnlpy/**"
      - "pyproject.toml"
      - ".github/workflows/dnnlpy-ci.yml"
  pull_request:
    paths:
      - "dnnlpy/**"
      - "pyproject.toml"
      - ".github/workflows/dnnlpy-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: dnnlpy-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dnnlpy-test-build:
    name: Test and Build dnnlpy package (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Format check with ruff
        uses: astral-sh/ruff-action@v4.0.0
        with:
          args: format --check --diff
          src: >-
            dnnlpy/src
            dnnlpy/tests

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            dnnlpy/pyproject.toml

      - name: Install dependencies
        run: |
          uv python install ${{ matrix.python-version }}
          uv sync --python ${{ matrix.python-version }} --package dnnlpy --extra test

      - name: Test dnnlpy package
        run: uv run --package dnnlpy -m pytest dnnlpy/tests

      - name: Build dnnlpy package
        run: uv build --package dnnlpy --out-dir dist

      - name: Generate package attestation
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.whl

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: dnnlpy-package-py${{ matrix.python-version }}
          path: |
            dist/*.tar.gz
            dist/*.whl
          if-no-files-found: error
